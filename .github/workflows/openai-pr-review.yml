name: OpenAI PR review request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  signal:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request trusted OpenAI review
        run: |
          echo "OpenAI review requested for pull request #${{ github.event.pull_request.number }}"
